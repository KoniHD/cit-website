name: Notify IndexNow

on:
  workflow_run:
    workflows:
      - Deploy via rsync over SSH
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: indexnow-submit
  cancel-in-progress: true

jobs:
  submit:
    if: github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    environment:
      name: deployment
    permissions:
      contents: read
    env:
      SITE_BASE_URL: https://home.cit.tum.de/~${{ vars.DEPLOY_USER }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Load IndexNow key
        id: load_key
        env:    
          KEY_LOCATION: ${{ env.SITE_BASE_URL }}/IndexNowKey.txt
        run: |
          set -euo pipefail

          if [ ! -f "IndexNowKey.txt" ]; then
            echo "Missing IndexNowKey.txt in repository root." >&2
            exit 1
          fi

          INDEXNOW_KEY="$(tr -d '\r\n' < IndexNowKey.txt)"
          if [ -z "$INDEXNOW_KEY" ]; then
            echo "IndexNowKey.txt is empty." >&2
            exit 1
          fi
          echo "INDEXNOW_KEY=$INDEXNOW_KEY" >> "$GITHUB_OUTPUT"
          echo "KEY_LOCATION=$KEY_LOCATION" >> "$GITHUB_OUTPUT"
      
      - name: Check for changes
        id: check_changes
        env:
          SITEMAP_URL: ${{ env.SITE_BASE_URL }}/sitemap.xml
        run: |
          set -euo pipefail
          
          SITEMAP_XML="$(curl --fail --silent --show-error "$SITEMAP_URL")"
          URLS="$(printf '%s' "$SITEMAP_XML" | perl -0777 -ne 'while (/<loc>\s*([^<]+)\s*<\/loc>/g) { print "$1\n" }' | sed '/^$/d')"

          if [ -z "$URLS" ]; then
            echo "No URLs found in sitemap: $SITEMAP_URL" >&2
            exit 1
          fi

          HOST="$(printf '%s\n' "$URLS" | sed -n '1s#^[A-Za-z][A-Za-z0-9+.-]*://\([^/]*\).*$#\1#p')"
          if [ -z "$HOST" ]; then
            echo "Could not derive host from sitemap URLs." >&2
            exit 1
          fi

          # IndexNow expects all URLs to belong to the declared host.
          while IFS= read -r URL; do
            URL_HOST="$(printf '%s' "$URL" | sed -n 's#^[A-Za-z][A-Za-z0-9+.-]*://\([^/]*\).*$#\1#p')"
            if [ "$URL_HOST" != "$HOST" ]; then
              echo "Sitemap URL host mismatch: $URL" >&2
              exit 1
            fi
          done <<< "$URLS"

          URL_LIST_JSON="$(printf '%s\n' "$URLS" | jq -Rc '[.,inputs]')"
          echo "URL_LIST_JSON=$URL_LIST_JSON" >> "$GITHUB_OUTPUT"
          echo "HOST=$HOST" >> "$GITHUB_OUTPUT"

      - name: Submit sitemap URLs to IndexNow
        id: indexnow
        env:
          INDEXNOW_ENDPOINT: https://api.indexnow.org/indexnow
          HOST: ${{ steps.check_changes.outputs.HOST }}
          INDEXNOW_KEY: ${{ steps.load_key.outputs.INDEXNOW_KEY }}
          KEY_LOCATION: ${{ env.SITE_BASE_URL }}/IndexNowKey.txt
          URL_LIST_JSON: ${{ steps.check_changes.outputs.URL_LIST_JSON }}
        run: |
          PAYLOAD="$(jq -n --arg host "$HOST" \
            --arg key "$INDEXNOW_KEY" \
            --arg keyLocation "$KEY_LOCATION" \
            --argjson urlList "$URL_LIST_JSON" \
            '{host:$host,key:$key,keyLocation:$keyLocation,urlList:$urlList}')"

          HTTP_CODE="$(curl --silent --show-error --output /tmp/indexnow-response.txt --write-out '%{http_code}' \
            --request POST \
            --header 'Content-Type: application/json; charset=utf-8' \
            --data "$PAYLOAD" \
            "$INDEXNOW_ENDPOINT")"

          if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
            echo "IndexNow submission failed with HTTP $HTTP_CODE" >&2
            cat /tmp/indexnow-response.txt >&2 || true
            exit 1
          fi

          URL_COUNT="$(printf '%s' '${{ steps.check_changes.outputs.URL_LIST_JSON }}' | jq 'length')"
          echo "URL_COUNT=$URL_COUNT" >> "$GITHUB_OUTPUT"
          echo "Submitted $URL_COUNT URL(s) to IndexNow."

      - name: Write workflow summary
        if: success()
        env:
          URL_COUNT: ${{ steps.indexnow.outputs.URL_COUNT }}
        run: |
          echo "### IndexNow Submission" >> "$GITHUB_STEP_SUMMARY"
          echo "- Sitemap: ${{ env.SITE_BASE_URL }}/sitemap.xml" >> "$GITHUB_STEP_SUMMARY"
          echo "- Endpoint: https://api.indexnow.org/indexnow" >> "$GITHUB_STEP_SUMMARY"
          echo "- URLs submitted: ${URL_COUNT}" >> "$GITHUB_STEP_SUMMARY"
          echo "- Status: success" >> "$GITHUB_STEP_SUMMARY"
