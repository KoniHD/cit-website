name: Deploy via rsync over SSH

on:
  push:
    branches:
      - main
    paths:
      - "index.html"
      - "de/index.html"
      - "package.json"
      - "profile.yml"
      - "robots.txt"
      - "site.webmanifest"
      - "sitemap.xml"
      - "IndexNowKey.txt"
      - "photo.webp"
      - "icons/**"
      - "scripts/**"
      - "styles/**"
  workflow_dispatch:

concurrency:
  group: deploy-production
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install build dependencies
        run: npm install --no-audit --no-fund

      - name: Validate profile.yml
        run: npm run validate

      - name: Build deploy artifact from profile.yml
        run: node ./scripts/build-index.mjs --build-dir deploy-build

      - name: Ensure exiftool is available
        run: |
          set -euo pipefail
          if command -v exiftool >/dev/null 2>&1; then
            echo "exiftool is already available"
            exit 0
          fi

          sudo apt-get update && sudo apt-get install --yes libimage-exiftool-perl

      - name: Strip image metadata in build artifact
        run: |
          set -euo pipefail
          find deploy-build -type f \( \
            -iname "*.webp" -o \
            -iname "*.png" -o \
            -iname "*.jpg" -o \
            -iname "*.jpeg" \
          \) -print0 | xargs -0 -r exiftool -overwrite_original -all=

      - name: Upload deploy artifact
        uses: actions/upload-artifact@v4
        with:
          name: deploy-build
          path: deploy-build
          if-no-files-found: error

  report-build-status:
    needs:
      - build
      - deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      DEPLOY_HOST: lxhalle.in.tum.de
    if: always()
    steps:
      - name: Generate Deployment Summary
        run: |
          echo "### Deployment Report :rocket:" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Status |" >> $GITHUB_STEP_SUMMARY
          echo "| :--- | :--- |" >> $GITHUB_STEP_SUMMARY
          echo "| **Target Host** | ${{ env.DEPLOY_HOST }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Build Result** | ${{ needs.build.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Deploy Result** | ${{ needs.deploy.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **URL** | [View Site](https://home.cit.tum.de/~${{ vars.DEPLOY_USER }}) |" >> $GITHUB_STEP_SUMMARY

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: deployment
      url: https://home.cit.tum.de/~${{ vars.DEPLOY_USER }}
    env:
      DEPLOY_HOST: lxhalle.in.tum.de
      DEPLOY_PORT: 22
      DEPLOY_PATH: ./
      SSH_ED25519_FP: "SHA256:dSj0mkyuOXEdpKGGJmXkvhDnvbjGmGCYQXA0pV8Pe4s"
    permissions:
      contents: read

    steps:
      - name: Download deploy artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-build
          path: deploy-build

      - name: Start SSH agent and add private key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.DEPLOY_SSH_KEY }}

      - name: Pin and verify server host keys
        run: |
          mkdir --parents --mode=u=rwx,go= ~/.ssh

          KEYSCAN_OUTPUT="$(ssh-keyscan -p "${{ env.DEPLOY_PORT }}" -t ed25519 "${{ env.DEPLOY_HOST }}" 2>/dev/null)"
          if [ -z "${KEYSCAN_OUTPUT}" ]; then
            echo "Failed to retrieve host keys from ${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PORT }}" >&2
            exit 1
          fi

          ED25519_LINE="$(printf '%s\n' "${KEYSCAN_OUTPUT}" | awk '$2 == "ssh-ed25519" { print; exit }')"

          if [ -z "${ED25519_LINE}" ]; then
            echo "Missing expected key types from ssh-keyscan output" >&2
            exit 1
          fi

          ACTUAL_ED25519_FP="$(printf '%s\n' "${ED25519_LINE}" | ssh-keygen -lf - -E sha256 | awk '{print $2}')"

          if [ "${ACTUAL_ED25519_FP}" != "${{ env.SSH_ED25519_FP }}" ]; then
            echo "ED25519 fingerprint mismatch: ${ACTUAL_ED25519_FP}" >&2
            exit 1
          fi

          printf '%s\n' "${ED25519_LINE}" > ~/.ssh/known_hosts
          chmod u=rw,go=r ~/.ssh/known_hosts

      - name: Sync files to server
        run: |

          # Intentionally do not preserve perms/owner/group so server-side
          # permission settings are not reset on each deployment.
          rsync --recursive --compress --delete-during --times --quiet \
                --no-perms --no-owner --no-group \
              --exclude='node_modules/' \
              --exclude='package.json' \
              --exclude='package-lock.json' \
              --exclude='profile.yml' \
            -e "ssh -p ${{ env.DEPLOY_PORT }} -o StrictHostKeyChecking=yes \
                -o HostKeyAlgorithms=ssh-ed25519" \
            deploy-build/ "${{ vars.DEPLOY_USER }}@${{ env.DEPLOY_HOST }}:${{ env.DEPLOY_PATH }}"

      - name: Print deployment URL
        if: success()
        run: |
          echo "Deployment successful: https://home.cit.tum.de/~${{ vars.DEPLOY_USER }}"
